<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: rgb(200, 200, 200);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;

      height: 340px;
      background-color: white;
      width: 220px;
      border-radius: 10px;
    }
    .qr-img img {
      width: 200px;
      height: 200px;
      border-radius: 10px;
    }
    .qr-img {
      padding: 10px;
      padding-bottom: 10px;
    }
    .text {
      text-align: center;
      font-size: 7px;
      color: rgb(4, 35, 72);
      width: 190px;
    }
    .description {
      font-size: 11px;
      width: 190px;
      color: rgb(194, 194, 194);
      line-height: 14px;
      /* font-weight: bold; */
    }
  </style>
  <body>
    <div class="preview">
      <div class="qr-img">
        <img src="image-qr-code.png" alt="" />
      </div>
      <div class="text">
        <h1 class="title">
          Improve your front-end skills by building projects
        </h1>
        <p class="description">
          Scan the QR code to visit Frontend Mentor and take your coding skills
          to the next level
        </p>
      </div>
    </div>
  </body>
</html>
